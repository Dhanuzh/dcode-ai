document.getElementById("attach-btn").onclick = () => fileInput.click();
fileInput.onchange = () => { [...fileInput.files].forEach(uploadFile); fileInput.value = ""; };

async function uploadFile(file) {
  const chip = el("div", "chip uploading");
  // Keep the local blob URL so the sent user bubble can show a thumbnail
  // without a server round-trip (and independent of post-turn file deletion).
  let objectUrl = null;
  if (file.type.startsWith("image/")) {
    objectUrl = URL.createObjectURL(file);
    const img = document.createElement("img");
    img.src = objectUrl;
    chip.appendChild(img);
  }
  chip.appendChild(el("span", "cname", file.name));
  const x = el("button", "cx", "✕");
  chip.appendChild(x);
  chips.appendChild(chip);
  chips.classList.add("has");
  try {
    const r = await api("/api/upload?name=" + encodeURIComponent(file.name), null, file);
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || "upload failed");
    const entry = { path: d.path, media_type: d.media_type, is_image: d.is_image, name: d.name, chip, objectUrl };
    pending.push(entry);
    chip.classList.remove("uploading");
    x.onclick = () => {
      pending = pending.filter((p) => p !== entry);
      chip.remove();
      if (!pending.length) chips.classList.remove("has");
    };
  } catch (e) {
    chip.remove();
    if (!pending.length) chips.classList.remove("has");
    row("sys error").textContent = "upload failed: " + e.message;
  }
}

// paste an image straight into the composer
input.addEventListener("paste", (e) => {
  const items = [...(e.clipboardData?.items || [])];
  const imgs = items.filter((i) => i.kind === "file" && i.type.startsWith("image/"));
  if (!imgs.length) return;
  e.preventDefault();
  imgs.forEach((i) => {
    const f = i.getAsFile();
    if (f) uploadFile(new File([f], f.name || "pasted.png", { type: f.type }));
  });
});

// drag & drop anywhere onto the page
let dragDepth = 0;
document.addEventListener("dragenter", (e) => { e.preventDefault(); dragDepth++; document.body.classList.add("dragging"); });
document.addEventListener("dragleave", () => { if (--dragDepth <= 0) { dragDepth = 0; document.body.classList.remove("dragging"); } });
document.addEventListener("dragover", (e) => e.preventDefault());
document.addEventListener("drop", (e) => {
  e.preventDefault();
  dragDepth = 0;
  document.body.classList.remove("dragging");
  [...(e.dataTransfer?.files || [])].forEach(uploadFile);
});

function clearPending() {
  pending = [];
  chips.textContent = "";
  chips.classList.remove("has");
}

/* ── composer ──────────────────────────────────────────────── */
function send() {
  const text = input.value.trim();
  if (!text && !pending.length) return;
  requestNotify(); // ask once, on a user gesture
  if (text.startsWith("/") && handleSlash(text)) { input.value = ""; hideSuggest(); autoResizeInput(); return; }
  // Images ride as U+0001 attach: header lines (parsed by the service loop and
  // fed to the model natively); other files are referenced by path for the
  // agent's read_file tool.
  let content = text;
  const files = pending.filter((p) => !p.is_image);
  if (files.length) {
    content += "\n\n" + files.map((f) => "[attached file: " + f.path + "]").join("\n");
  }
  const images = pending.filter((p) => p.is_image);
  const header = images.map((i) => "\u0001attach:" + i.media_type + ":" + i.path + "\n").join("");
  // Hand this send's thumbnails to the FIFO the user-echo handler drains, so
  // they render in the matching user bubble.
  if (images.length) {
    sentImageQueue.push(images.map((i) => ({ url: i.objectUrl, name: i.name })));
  }
  input.value = "";
  hideSuggest();
  autoResizeInput();
  clearPending();
  stick = true;
  setAgentState(true); // instant feedback; BusyStateChanged confirms/corrects
  sendCommand({ type: "SendMessage", content: header + content });
}
document.getElementById("send").onclick = send;
document.getElementById("cancel").onclick = () => {
  // Immediate feedback; the server confirms with BusyStateChanged{idle}.
  busyText.textContent = "cancelling…";
  sendCommand({ type: "Cancel" });
};
function autoResizeInput() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 240) + "px";
}
input.addEventListener("input", () => { autoResizeInput(); updateSuggest(); });
input.addEventListener("blur", () => setTimeout(hideSuggest, 150));
input.addEventListener("keydown", (e) => {
  const open = suggest.style.display === "block" && suggestItems.length > 0;
  if (open) {
    if (e.key === "ArrowDown") { e.preventDefault(); suggestIndex = (suggestIndex + 1) % suggestItems.length; renderSuggest(); return; }
    if (e.key === "ArrowUp") { e.preventDefault(); suggestIndex = (suggestIndex - 1 + suggestItems.length) % suggestItems.length; renderSuggest(); return; }
    if (e.key === "Tab") { e.preventDefault(); pickSuggest(suggestIndex); return; }
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (suggestItems[suggestIndex] && suggestItems[suggestIndex][0] === input.value.trim()) send();
      else pickSuggest(suggestIndex);
      return;
    }
    if (e.key === "Escape") { e.preventDefault(); hideSuggest(); return; }
  }
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

/* ── global shortcuts ──────────────────────────────────────── */
document.addEventListener("keydown", (e) => {
  if (e.ctrlKey && !e.shiftKey && !e.altKey) {
    const k = e.key.toLowerCase();
    if (k === "b") { e.preventDefault(); document.getElementById("sidebar-toggle").click(); return; }
    if (k === "k") {
      e.preventDefault();
      setSidebar(false);
      document.getElementById("session-search").focus();
      return;
    }
    if (k === "/") { e.preventDefault(); input.focus(); return; }
  }
  if (e.key === "?" && document.activeElement !== input) { e.preventDefault(); showShortcuts(); return; }
  if (e.key === "Escape") {
    const modal = document.getElementById("shortcuts-modal") || document.getElementById("files-modal");
    if (modal) { modal.remove(); return; }
    if (settingsPanel.classList.contains("open")) { settingsPanel.classList.remove("open"); return; }
    if (document.activeElement !== input) sendCommand({ type: "Cancel" });
  }
});

/* ── boot ──────────────────────────────────────────────────── */
fetchHistory();
fetchInfo();
fetchSessions();
fetchWorkspaceFiles(); // powers @mention completion
reconnectEvents();
setInterval(fetchSessions, 30000); // keep relative times & statuses fresh
</script>
