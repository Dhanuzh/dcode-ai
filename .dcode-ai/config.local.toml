[provider]
default = "opencodezen"

[provider.openai]
api_key_env = "OPENAI_API_KEY"
base_url = "https://api.githubcopilot.com"
model = "MiniMax-M2.5"
temperature = 0.7

[provider.anthropic]
api_key_env = "ANTHROPIC_API_KEY"
base_url = "https://api.anthropic.com"
model = "claude-3-7-sonnet-latest"
temperature = 1.0

[provider.openrouter]
api_key_env = "OPENROUTER_API_KEY"
base_url = "https://openrouter.ai/api"
model = "openai/gpt-4o-mini"
temperature = 0.7

[provider.opencodezen]
api_key_env = "OPENCODE_API_KEY"
api_key = "sk-yHtlbRmjdvyxxTa5UbhvlSdxGC1HiV4kLNg2ObxkRY0L6Ts8P7uxPxNlasroeJeX"
base_url = "https://opencode.ai/zen/v1"
model = "big-pickle"
temperature = 0.7

[model]
default_model = "big-pickle"
max_tokens = 8192
enable_thinking = false
thinking_budget = 5120
recent_models = [
    "big-pickle",
    "minimax-m2.5-free",
    "glm-5",
    "claude-opus-4-5",
    "MiniMax-M2.5",
    "gemini-2.5-pro",
    "claude-sonnet-4.6",
    "gpt-5.2",
]

[model.aliases]
claude = "claude-3-7-sonnet-latest"
claude-sonnet = "claude-3-7-sonnet-latest"
coding = "MiniMax-M2.5"
default = "gpt-4o-mini"
gpt4o = "gpt-4o"
gpt4omini = "gpt-4o-mini"
"m2.5" = "MiniMax-M2.5"
minimax = "MiniMax-M2.5"
openai = "gpt-4o-mini"
openrouter = "openai/gpt-4o-mini"
reasoning = "MiniMax-M2.5"

[permissions]
mode = "default"
allow = []
deny = []
ask = []

[session]
history_dir = ".dcode-ai/sessions"
max_turns_per_run = 128
max_tool_calls_per_turn = 200
checkpoint_interval = 5
last_session_file = ".dcode-ai/.last_session"
auto_compact_on_finish = false

[harness]
built_in_enabled = true
project_instructions_path = ".dcode-airc"
local_instructions_path = ".dcode-ai/instructions.md"
skill_directories = [
    ".dcode-ai/skills",
    ".claude/skills",
]

[mcp]
expose_in_safe_mode = false
servers = []

[memory]
file_path = ".dcode-ai/memory.json"
max_notes = 128
auto_compact_on_finish = false

[memory.context]
context_window_target = 0
auto_detect_context_window = true
query_provider_models_api = true
max_retained_messages = 50
auto_summarize_threshold = 75
enable_auto_summarize = true

[hooks]
session_start = []
session_end = []
pre_tool_use = []
post_tool_use = []
post_tool_failure = []
approval_requested = []
subagent_start = []
subagent_stop = []

[web]
timeout_secs = 15
max_fetch_chars = 25000
default_search_limit = 5
user_agent = "dcode-ai/0.5 (+https://github.com/user/dcode-ai)"

[ui]
theme = "transparent"
hide_tips = false
scroll_speed = 3
code_line_numbers = false
onboarding_completed = true
