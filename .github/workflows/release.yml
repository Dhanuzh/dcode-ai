name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Only run release jobs when:
# - A PR is merged to main (from dev or any branch)
# - A version tag is pushed (v*)
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: dcode-ai

jobs:
  # Determine if this is a release-worthy push
  should-release:
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Check release conditions
        id: check
        run: |
          REF="${{ github.ref }}"
          MERGED="${{ github.event.pull_request.merged }}"
          # Release on PR merge to main
          if [[ "$MERGED" == "true" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "trigger=PR merge to main" >> "$GITHUB_OUTPUT"
          # Release on tag push (refs/tags/v*)
          elif [[ "$REF" == refs/tags/v* ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "trigger=Tag push $REF" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "trigger=Non-release push $REF" >> "$GITHUB_OUTPUT"
          fi

  # CI check (required before release)
  ci-check:
    needs: should-release
    if: needs.should-release.outputs.value == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config ripgrep

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

  # Multi-platform build
  build:
    needs: [should-release, ci-check]
    if: needs.should-release.outputs.value == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install OpenSSL (Linux targets)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p dcode-ai-cli

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ env.BINARY_NAME }}-${{ matrix.target }}.tar.gz ${{ env.BINARY_NAME }}
          cd ../../..
          sha256sum ${{ env.BINARY_NAME }}-${{ matrix.target }}.tar.gz > ${{ env.BINARY_NAME }}-${{ matrix.target }}.tar.gz.sha256

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe"
          $out = "${{ env.BINARY_NAME }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $out
          $hash = (Get-FileHash $out -Algorithm SHA256).Hash.ToLower()
          "$hash  $out" | Out-File -Encoding utf8 "$out.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: |
            ${{ env.BINARY_NAME }}-${{ matrix.target }}.*

  # Create GitHub Release (only on tags)
  release:
    needs: [should-release, build]
    if: needs.should-release.outputs.value == 'true' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
