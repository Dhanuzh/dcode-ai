# cargo-deny configuration — supply-chain gate run in CI.
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# RustSec advisory DB: fail the build on known-vulnerable or yanked crates.
yanked = "deny"
ignore = []

[licenses]
# Allow only OSI-approved/permissive licenses compatible with this MIT crate.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions bloat the binary; warn so they surface without blocking.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
