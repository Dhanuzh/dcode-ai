# cargo-deny configuration — supply-chain gate run in CI.
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# RustSec advisory DB: fail the build on known-vulnerable or yanked crates.
yanked = "deny"
ignore = [
    # bincode 1.x is unmaintained; pulled only by syntect's binary asset
    # loading (syntax-highlighting themes). No untrusted input flows there.
    "RUSTSEC-2025-0141",
    # fxhash is unmaintained; pulled by scraper -> selectors for CSS matching
    # on fetched HTML. Hashing only; replace when scraper drops it.
    "RUSTSEC-2025-0057",
]

[licenses]
# Allow only OSI-approved/permissive licenses compatible with this MIT crate.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "OpenSSL",
    "BSL-1.0",
    # Data-only license used by webpki-root-certs / webpki-roots (Mozilla CA
    # bundle); permissive, MIT-compatible.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions bloat the binary; warn so they surface without blocking.
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal `{ path = "…" }` deps carry no version; that's fine.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
